name: Release & Deploy

on:
  push:
    branches: [main]

concurrency:
  group: release-pages
  cancel-in-progress: false

# Opt-in : exécute les actions JS sur Node 24 (GitHub forcera ce comportement
# en juin 2026). Élimine les warnings de dépréciation de Node 20.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

permissions:
  contents: write
  issues: write
  pull-requests: write
  pages: write
  id-token: write

jobs:
  release:
    name: Semantic release + build
    runs-on: ubuntu-latest
    outputs:
      released: ${{ steps.semrel.outputs.new_release_published }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Lint
        run: yarn lint

      - name: Semantic release
        id: semrel
        uses: cycjimmy/semantic-release-action@v4
        with:
          extra_plugins: |
            @semantic-release/changelog
            @semantic-release/git
            conventional-changelog-conventionalcommits
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build
        if: steps.semrel.outputs.new_release_published == 'true'
        env:
          PIANOFLOW_BASE: /pianoflow/
        run: yarn build

      - name: Upload Pages artifact
        if: steps.semrel.outputs.new_release_published == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    name: Deploy to GitHub Pages
    needs: release
    if: needs.release.outputs.released == 'true'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
