<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f0d1a"/>
      <stop offset="100%" stop-color="#1a1530"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="50%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- Notes qui tombent -->
  <rect x="120" y="80"  width="48" height="180" rx="14" fill="url(#accent)" opacity="0.85"/>
  <rect x="200" y="40"  width="48" height="240" rx="14" fill="#22c55e"/>
  <rect x="280" y="120" width="48" height="160" rx="14" fill="#3a7bd5"/>
  <rect x="360" y="60"  width="48" height="220" rx="14" fill="#a78bfa"/>
  <!-- Ligne de frappe -->
  <rect x="64" y="312" width="384" height="4" rx="2" fill="#e74c3c"/>
  <!-- Clavier stylisé -->
  <g transform="translate(64, 320)">
    <rect width="384" height="128" rx="10" fill="#fafafa"/>
    <line x1="64"  y1="0" x2="64"  y2="128" stroke="#000" stroke-width="2"/>
    <line x1="128" y1="0" x2="128" y2="128" stroke="#000" stroke-width="2"/>
    <line x1="192" y1="0" x2="192" y2="128" stroke="#000" stroke-width="2"/>
    <line x1="256" y1="0" x2="256" y2="128" stroke="#000" stroke-width="2"/>
    <line x1="320" y1="0" x2="320" y2="128" stroke="#000" stroke-width="2"/>
    <!-- Touches noires -->
    <rect x="44"  y="0" width="40" height="80" rx="3" fill="#1a1530"/>
    <rect x="108" y="0" width="40" height="80" rx="3" fill="#1a1530"/>
    <rect x="236" y="0" width="40" height="80" rx="3" fill="#1a1530"/>
    <rect x="300" y="0" width="40" height="80" rx="3" fill="#1a1530"/>
    <!-- Touche surlignée -->
    <rect x="172" y="0" width="40" height="80" rx="3" fill="url(#accent)"/>
  </g>
</svg>
